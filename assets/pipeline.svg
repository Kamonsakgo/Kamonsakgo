<svg width="900" height="280" viewBox="0 0 900 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="pGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="pGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1c2530" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="900" height="280" fill="#0d1117"/>
  <rect width="900" height="280" fill="url(#pGrid)"/>

  <text x="24" y="30" font-family="'Courier New', monospace" font-size="13" fill="#3fb950" opacity="0.8">// microservices in motion</text>
  <text x="750" y="30" font-family="'Courier New', monospace" font-size="12" fill="#bd00ff" opacity="0.8">[ live traffic ]</text>

  <!-- edges -->
  <g stroke="#30363d" stroke-width="1.5" fill="none">
    <path id="e1" d="M 120 145 H 205"/>
    <path id="e2" d="M 355 145 C 400 145 400 75 445 75"/>
    <path id="e3" d="M 355 145 H 445"/>
    <path id="e4" d="M 355 145 C 400 145 400 215 445 215"/>
    <path id="e5" d="M 615 75 C 660 75 660 110 705 110"/>
    <path id="e6" d="M 615 145 C 660 145 660 110 705 110"/>
    <path id="e7" d="M 615 215 C 660 215 660 180 705 180"/>
    <path id="e8" d="M 615 145 C 655 145 655 180 705 180"/>
  </g>

  <!-- nodes -->
  <g font-family="'Courier New', monospace" text-anchor="middle">
    <!-- client -->
    <rect x="30" y="120" width="90" height="50" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
    <text x="75" y="150" font-size="14" fill="#e6edf3">CLIENT</text>

    <!-- gateway -->
    <rect x="205" y="115" width="150" height="60" rx="8" fill="#161b22" stroke="#00ff9f" stroke-width="2" filter="url(#pGlow)"/>
    <text x="280" y="140" font-size="14" fill="#00ff9f">API GATEWAY</text>
    <text x="280" y="160" font-size="11" fill="#8b949e">REST · JWT</text>

    <!-- services -->
    <rect x="445" y="50" width="170" height="50" rx="8" fill="#161b22" stroke="#00e5ff" stroke-width="1.5"/>
    <text x="530" y="72" font-size="13" fill="#00e5ff">auth-service</text>
    <text x="530" y="90" font-size="11" fill="#8b949e">Go · Gin</text>

    <rect x="445" y="120" width="170" height="50" rx="8" fill="#161b22" stroke="#00e5ff" stroke-width="1.5"/>
    <text x="530" y="142" font-size="13" fill="#00e5ff">core-api</text>
    <text x="530" y="160" font-size="11" fill="#8b949e">PHP · Laravel</text>

    <rect x="445" y="190" width="170" height="50" rx="8" fill="#161b22" stroke="#00e5ff" stroke-width="1.5"/>
    <text x="530" y="212" font-size="13" fill="#00e5ff">report-service</text>
    <text x="530" y="230" font-size="11" fill="#8b949e">Python · Django</text>

    <!-- datastores -->
    <g>
      <rect x="705" y="88" width="150" height="44" rx="8" fill="#161b22" stroke="#bd00ff" stroke-width="1.5"/>
      <text x="780" y="107" font-size="13" fill="#bd00ff">MySQL</text>
      <text x="780" y="124" font-size="10" fill="#8b949e">primary + replica</text>
    </g>
    <g>
      <rect x="705" y="158" width="150" height="44" rx="8" fill="#161b22" stroke="#bd00ff" stroke-width="1.5"/>
      <text x="780" y="177" font-size="13" fill="#bd00ff">RabbitMQ</text>
      <text x="780" y="194" font-size="10" fill="#8b949e">async jobs</text>
    </g>
  </g>

  <!-- packets -->
  <g filter="url(#pGlow)">
    <circle r="4" fill="#00ff9f">
      <animateMotion dur="1.6s" repeatCount="indefinite"><mpath href="#e1"/></animateMotion>
    </circle>
    <circle r="3.5" fill="#00e5ff">
      <animateMotion dur="1.8s" begin="0.5s" repeatCount="indefinite"><mpath href="#e2"/></animateMotion>
    </circle>
    <circle r="3.5" fill="#00e5ff">
      <animateMotion dur="1.5s" begin="1.1s" repeatCount="indefinite"><mpath href="#e3"/></animateMotion>
    </circle>
    <circle r="3.5" fill="#00e5ff">
      <animateMotion dur="2s" begin="0.2s" repeatCount="indefinite"><mpath href="#e4"/></animateMotion>
    </circle>
    <circle r="3" fill="#bd00ff">
      <animateMotion dur="1.4s" begin="0.9s" repeatCount="indefinite"><mpath href="#e5"/></animateMotion>
    </circle>
    <circle r="3" fill="#bd00ff">
      <animateMotion dur="1.7s" begin="1.6s" repeatCount="indefinite"><mpath href="#e6"/></animateMotion>
    </circle>
    <circle r="3" fill="#bd00ff">
      <animateMotion dur="1.5s" begin="0.4s" repeatCount="indefinite"><mpath href="#e7"/></animateMotion>
    </circle>
    <circle r="3" fill="#bd00ff">
      <animateMotion dur="1.9s" begin="1.2s" repeatCount="indefinite"><mpath href="#e8"/></animateMotion>
    </circle>
  </g>

  <!-- status ticks -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#3fb950">
    <text x="150" y="135" opacity="0">200 OK
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0.8s" repeatCount="indefinite"/>
    </text>
    <text x="640" y="60" opacity="0" fill="#00e5ff">↺ retry-safe
      <animate attributeName="opacity" values="0;0.9;0" dur="4s" begin="2s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- heartbeat line at bottom -->
  <path d="M 0 262 H 360 l 8 -12 l 10 24 l 8 -12 H 900" stroke="#00ff9f" stroke-width="1.5" fill="none" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="2s" repeatCount="indefinite"/>
  </path>
</svg>
