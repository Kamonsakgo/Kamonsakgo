<svg width="840" height="330" viewBox="0 0 840 330" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="tGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <mask id="type1"><rect x="46" y="58" width="0" height="24" fill="#fff"><animate attributeName="width" from="0" to="62" begin="0.4s" dur="0.6s" fill="freeze"/></rect></mask>
    <mask id="type2"><rect x="46" y="110" width="0" height="24" fill="#fff"><animate attributeName="width" from="0" to="128" begin="2.0s" dur="0.9s" fill="freeze"/></rect></mask>
    <mask id="type3"><rect x="46" y="162" width="0" height="24" fill="#fff"><animate attributeName="width" from="0" to="128" begin="3.9s" dur="0.9s" fill="freeze"/></rect></mask>
    <mask id="type4"><rect x="46" y="214" width="0" height="24" fill="#fff"><animate attributeName="width" from="0" to="250" begin="5.8s" dur="1.2s" fill="freeze"/></rect></mask>
  </defs>

  <!-- window -->
  <rect x="4" y="4" width="832" height="322" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <path d="M 4 16 Q 4 4 16 4 H 824 Q 836 4 836 16 V 40 H 4 Z" fill="#161b22"/>
  <line x1="4" y1="40" x2="836" y2="40" stroke="#30363d" stroke-width="1"/>
  <circle cx="26" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="22" r="6" fill="#27c93f"/>
  <text x="420" y="27" font-family="'Courier New', monospace" font-size="13" fill="#8b949e" text-anchor="middle">kamonsak@github : ~/profile</text>

  <g font-family="'Courier New', monospace" font-size="15">
    <!-- $ whoami -->
    <text x="28" y="76" fill="#00ff9f" filter="url(#tGlow)">$</text>
    <text x="46" y="76" fill="#e6edf3" mask="url(#type1)">whoami</text>
    <text x="28" y="102" fill="#8b949e" opacity="0">กมลศักดิ์ (Kamonsak) — Backend Developer 🇹🇭
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.05s" fill="freeze"/>
    </text>

    <!-- $ cat stack.txt -->
    <text x="28" y="128" fill="#00ff9f" filter="url(#tGlow)" opacity="0">$
      <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.05s" fill="freeze"/>
    </text>
    <text x="46" y="128" fill="#e6edf3" mask="url(#type2)">cat stack.txt</text>
    <text x="28" y="154" fill="#00e5ff" opacity="0">Go · Python · PHP&#160;&#160;|&#160;&#160;Gin · Fiber · Laravel · Django
      <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.05s" fill="freeze"/>
    </text>

    <!-- $ cat focus.txt -->
    <text x="28" y="180" fill="#00ff9f" filter="url(#tGlow)" opacity="0">$
      <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.05s" fill="freeze"/>
    </text>
    <text x="46" y="180" fill="#e6edf3" mask="url(#type3)">cat focus.txt</text>
    <text x="28" y="206" fill="#bd00ff" filter="url(#tGlow)" opacity="0">Microservices · REST APIs · Cloud (AWS) · Docker · DevOps
      <animate attributeName="opacity" from="0" to="1" begin="5.0s" dur="0.05s" fill="freeze"/>
    </text>

    <!-- $ ping -->
    <text x="28" y="232" fill="#00ff9f" filter="url(#tGlow)" opacity="0">$
      <animate attributeName="opacity" from="0" to="1" begin="5.7s" dur="0.05s" fill="freeze"/>
    </text>
    <text x="46" y="232" fill="#e6edf3" mask="url(#type4)">ping kamonsak.go@gmail.com</text>
    <text x="28" y="258" fill="#8b949e" opacity="0">PONG ✓ — open for cool projects 🚀
      <animate attributeName="opacity" from="0" to="1" begin="7.2s" dur="0.05s" fill="freeze"/>
    </text>

    <!-- idle prompt + cursor -->
    <text x="28" y="290" fill="#00ff9f" filter="url(#tGlow)" opacity="0">$
      <animate attributeName="opacity" from="0" to="1" begin="7.8s" dur="0.05s" fill="freeze"/>
    </text>
    <rect x="46" y="277" width="10" height="17" fill="#00ff9f" opacity="0">
      <animate attributeName="opacity" values="0;0" begin="0s" dur="7.8s" fill="freeze"/>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" begin="7.8s" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
