<svg width="900" height="300" viewBox="0 0 900 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00ff9f"/>
      <stop offset="0.5" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#bd00ff"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00ff9f" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00ff9f" stop-opacity="1"/>
      <stop offset="1" stop-color="#00ff9f" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSmall" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1c2530" stroke-width="1"/>
    </pattern>
    <clipPath id="sliceClip">
      <rect x="0" y="118" width="900" height="16"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="900" height="300" fill="#0d1117"/>
  <rect width="900" height="300" fill="url(#grid)"/>

  <!-- corner HUD brackets -->
  <g stroke="url(#neonGrad)" stroke-width="2" fill="none" opacity="0.9">
    <path d="M 16 44 V 16 H 44"/>
    <path d="M 856 16 H 884 V 44"/>
    <path d="M 884 256 V 284 H 856"/>
    <path d="M 44 284 H 16 V 256"/>
  </g>

  <!-- HUD decorations -->
  <g font-family="'Courier New', monospace" font-size="12" fill="#3fb950" opacity="0.75">
    <text x="34" y="34">[ SYS.BOOT ] :: OK</text>
    <text x="790" y="34" fill="#bd00ff">v.2077</text>
    <text x="34" y="278" fill="#00e5ff" opacity="0.7">// bangkok, thailand</text>
    <text x="700" y="278" fill="#8b949e">uptime: ∞</text>
  </g>
  <g fill="#00ff9f">
    <rect x="440" y="26" width="5" height="5" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="450" y="26" width="5" height="5" fill="#00e5ff" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="460" y="26" width="5" height="5" fill="#bd00ff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- glitch layers -->
  <g font-family="'Courier New', monospace" font-weight="bold" font-size="84" text-anchor="middle" letter-spacing="6">
    <text x="450" y="150" fill="#bd00ff" opacity="0.75">KAMONSAK
      <animateTransform attributeName="transform" type="translate"
        values="0 0; -5 0; 3 0; 0 0; 0 0; 4 0; 0 0"
        keyTimes="0; 0.02; 0.04; 0.06; 0.5; 0.52; 0.54"
        dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="450" y="150" fill="#00e5ff" opacity="0.75">KAMONSAK
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 5 0; -3 0; 0 0; 0 0; -4 0; 0 0"
        keyTimes="0; 0.02; 0.04; 0.06; 0.5; 0.52; 0.54"
        dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="450" y="150" fill="url(#neonGrad)" filter="url(#glow)">KAMONSAK</text>
    <!-- horizontal slice glitch -->
    <g clip-path="url(#sliceClip)">
      <text x="450" y="150" fill="#e6edf3" opacity="0.9">KAMONSAK
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 0; 12 0; -9 0; 0 0; 0 0"
          keyTimes="0; 0.44; 0.46; 0.48; 0.5; 1"
          dur="3.1s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- subtitle -->
  <text x="450" y="205" font-family="'Courier New', monospace" font-size="24" text-anchor="middle"
        fill="#00e5ff" filter="url(#glowSmall)" letter-spacing="3">⚡ BACKEND DEVELOPER ⚡</text>

  <!-- typed tagline + cursor -->
  <g font-family="'Courier New', monospace" font-size="17">
    <text x="450" y="242" text-anchor="middle" fill="#8b949e" letter-spacing="1">&gt; Go · Python · PHP · Microservices · Cloud</text>
    <rect x="688" y="228" width="10" height="18" fill="#00ff9f">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- moving scanline -->
  <rect x="0" y="-60" width="900" height="60" fill="url(#scanGrad)" opacity="0.08">
    <animate attributeName="y" from="-60" to="300" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- fine scanlines overlay -->
  <g opacity="0.05">
    <rect y="0" width="900" height="1" fill="#00ff9f"/>
    <rect y="8" width="900" height="1" fill="#00ff9f"/>
    <rect y="16" width="900" height="1" fill="#00ff9f"/>
    <rect y="24" width="900" height="1" fill="#00ff9f"/>
  </g>

  <!-- bottom neon line -->
  <rect x="0" y="297" width="900" height="3" fill="url(#neonGrad)">
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
