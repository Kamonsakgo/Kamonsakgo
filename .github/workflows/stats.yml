name: Dev Stats

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/gen_stats.py
      - .github/workflows/stats.yml

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats SVG
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: python3 scripts/gen_stats.py

      - name: Push to stats branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: stats
          build_dir: out
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
